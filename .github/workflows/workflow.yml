name: CI/CD Pipeline - Build, Security & Push to OCIR

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]

env:
  OCI_REGISTRY: iad.ocir.io 
  OCI_REPOSITORY: cicd-oci
  OCI_TENANCY_NAMESPACE: ${{ vars.OCI_TENANCY_NAMESPACE }}
  IMAGE_NAME: app-producao

jobs:
  # ----------------------------------------------------
  # 1. BUILD & TEST (Execução paralela/inicial)
  # ----------------------------------------------------
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@1e31de5234b9f8995739874a8ce0492dc87873e2

      - name: Setup Environment
        uses: actions/setup-python@0a5c61591373683505ea898e09a3ea4f39ef2b9c
        with:
          python-version: '3.13'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python3 -m pip install --only-binary :all: --require-hashes -r requirements.txt

      - name: Run Unit Tests with Coverage
        run: |
          pytest --cov=. --cov-report=xml:coverage.xml

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@c7d193f32edcb7bfad88892161225aeda64e9392
        with:
          name: build-assets
          path: |
            requirements.txt
            coverage.xml

      - name: Notify Failure (Slack)
        if: failure()
        uses: slackapi/slack-github-action@e090a7a7c0b2d9b7ae32bd34f086e680ce260b06
        with:
          payload: '{"text": "❌ Falha na compilação ou nos testes unitários!"}'
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

  # ----------------------------------------------------
  # 2. SONARQUBE ANALYSIS (Quality Gate)
  # ----------------------------------------------------
  sonarqube:
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      - name: Checkout Code
        uses: actions/checkout@1e31de5234b9f8995739874a8ce0492dc87873e2
        with:
          fetch-depth: 0

      - name: Download Build Artifacts
        uses: actions/download-artifact@7a1cd3216ca9260cd8022db641d960b1db4d1be4
        with:
          name: build-assets

      - name: SonarQube Scan
        uses: sonarsource/sonarcloud-github-action@383f7e52eae3ab0510c3cb0e7d9d150bbaeab838
        with:
          args: >
            -Dsonar.python.coverage.reportPaths=coverage.xml
            -Dsonar.python.version=3.13
            -Dsonar.projectBaseDir=.
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

      - name: SonarQube Quality Gate Check
        uses: sonarsource/sonarqube-quality-gate-action@d304d050d930b02a896b0f85935344f023928496
        timeout-minutes: 5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: Notify Failure (Slack)
        if: failure()
        uses: slackapi/slack-github-action@70cd7be8e40a46e8b0eced40b0de447bdb42f68e
        with:
          payload: '{"text": "❌ O código quebrou o Quality Gate do SonarQube!"}'
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

  # ----------------------------------------------------
  # 3. TRIVY FS SCAN (Escaneamento de Dependências antes do Build)
  # ----------------------------------------------------
  trivy-fs:
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      - name: Checkout Code
        uses: actions/checkout@1e31de5234b9f8995739874a8ce0492dc87873e2

      - name: Run Trivy Vulnerability Scanner
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25
        with:
          scan-type: 'fs'
          scan-ref: '.'
          exit-code: '1'
          severity: 'CRITICAL'

      - name: Notify Failure (Slack)
        if: failure()
        uses: slackapi/slack-github-action@e090a7a7c0b2d9b7ae32bd34f086e680ce260b06
        with:
          payload: '{"text": "❌ Vulnerabilidades críticas de dependências encontradas pelo Trivy (FS)!"}'
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

  # ----------------------------------------------------
  # 4. BUILD DOCKER IMAGE & TRIVY IMAGE SCAN
  # ----------------------------------------------------
  build-and-scan-image:
    runs-on: ubuntu-latest
    needs: [sonarqube, trivy-fs]
    steps:
      - name: Checkout Code
        uses: actions/checkout@1e31de5234b9f8995739874a8ce0492dc87873e2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@f95db51fddba0c2d1ec667646a06c2ce06100226

      - name: Docker Meta (Tags Generation)
        id: meta
        uses: docker/metadata-action@96383f45573cb7f253c731d3b3ab81c87ef81934
        with:
          images: ${{ env.OCI_REGISTRY }}/${{ env.OCI_TENANCY_NAMESPACE }}/${{ env.OCI_REPOSITORY }}
          tags: |
            type=sha,format=long,prefix=
            type=raw,value=latest

      - name: Build Local Image
        uses: docker/build-push-action@c382f710d39a5bb4e430307530a720f50c2d3318
        with:
          context: .
          load: true
          tags: app-local-test:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

#      - name: Run Trivy Vulnerability Scanner (Image)
#        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25
#        with:
#          image-ref: 'app-local-test:latest'
#          exit-code: '1'
#          severity: 'CRITICAL'

      - name: Log in to Oracle Cloud OCIR
        uses: docker/login-action@343f7c4344506bcbf9b4de18042ae17996df046d
        with:
          registry: ${{ env.OCI_REGISTRY }}
          username: ${{ secrets.OCI_USERNAME }}
          password: ${{ secrets.OCI_AUTH_TOKEN }}

      - name: Push Docker Image to OCIR
        uses: docker/build-push-action@c382f710d39a5bb4e430307530a720f50c2d3318
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha,mode=max

      - name: Notify Failure (Slack)
        if: failure()
        uses: slackapi/slack-github-action@e090a7a7c0b2d9b7ae32bd34f086e680ce260b06
        with:
          payload: '{"text": "❌ Falha no Build Docker, no escaneamento do Trivy Image ou no Push para o OCIR!"}'
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}